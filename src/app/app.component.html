<main class="app-shell">
  <header class="app-header">
    <a routerLink="/home" class="brand" aria-label="Go to home page">
      <span class="brand__mark">SW</span>
      <span>
        <strong>{{ title }}</strong>
        <small>Angular • NgRx • SWAPI</small>
      </span>
    </a>

    <nav class="app-nav" aria-label="Primary navigation">
      <a routerLink="/home" routerLinkActive="active">Films</a>
    </nav>

    <button
      type="button"
      class="audio-button"
      (click)="toggleMusic()"
      [attr.aria-label]="isPlaying ? 'Stop theme music' : 'Play theme music'"
      [attr.aria-pressed]="isPlaying"
      [title]="isPlaying ? 'Stop theme music' : 'Play theme music'"
    >
      <mat-icon aria-hidden="true">{{
        isPlaying ? "volume_up" : "volume_off"
      }}</mat-icon>
    </button>
  </header>

  <router-outlet></router-outlet>
</main>
