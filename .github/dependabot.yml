version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    open-pull-requests-limit: 2
    commit-message:
      prefix: deps
    ignore:
      - dependency-name: typescript
        versions:
          - ">=6"
    groups:
      angular-dependencies:
        patterns:
          - "@angular*"
          - "@ngrx*"
          - "rxjs"
          - "zone.js"
          - "typescript"
      tooling-dependencies:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      day: monday
      time: "09:30"
      timezone: Europe/Berlin
    open-pull-requests-limit: 1
    commit-message:
      prefix: deps
